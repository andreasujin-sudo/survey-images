<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" width="1200" height="1500">
  <!-- background -->
  <rect width="1200" height="1500" fill="#FAF6F0"/>

  <!-- top brand strip -->
  <rect x="0" y="0" width="1200" height="110" fill="#1E3A5F"/>
  <g transform="translate(60,55)">
    <rect x="0" y="-22" width="44" height="44" rx="6" fill="#E07A37"/>
    <text x="22" y="10" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="28" fill="#FFFFFF">SM</text>
    <text x="64" y="2" font-family="Georgia,serif" font-weight="700" font-size="30" fill="#FFFFFF">St Mungo's</text>
    <text x="64" y="26" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#E8DDCB" letter-spacing="2">ENDING HOMELESSNESS · REBUILDING LIVES</text>
  </g>
  <text x="1140" y="60" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#E8DDCB" letter-spacing="1.5">stmungos.org</text>

  <!-- frame tag (auto-sized to text length) -->
  <rect x="60" y="150" width="170" height="44" rx="22" fill="#1E3A5F"/><text x="145.0" y="178.0" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="16" fill="#FFFFFF">YOUR IMPACT</text>

  <!-- hero circle + icon -->
  <circle cx="600" cy="430" r="200" fill="#E8DDCB"/>
  <g transform="translate(600,430)">
              <g transform="translate(-160,0)">
                <circle cx="0" cy="-30" r="18" fill="#1E3A5F"/>
                <path d="M -28 60 Q -28 -5 0 -5 Q 28 -5 28 60 Z" fill="#1E3A5F"/>
                <path d="M -34 5 Q -34 -8 -20 -8 L 20 -8 Q 34 -8 34 5 L 34 28 L -34 28 Z" fill="#E07A37"/>
              </g>
            
              <g transform="translate(-80,0)">
                <circle cx="0" cy="-30" r="18" fill="#1E3A5F"/>
                <path d="M -28 60 Q -28 -5 0 -5 Q 28 -5 28 60 Z" fill="#1E3A5F"/>
                <path d="M -34 5 Q -34 -8 -20 -8 L 20 -8 Q 34 -8 34 5 L 34 28 L -34 28 Z" fill="#E07A37"/>
              </g>
            
              <g transform="translate(0,0)">
                <circle cx="0" cy="-30" r="18" fill="#1E3A5F"/>
                <path d="M -28 60 Q -28 -5 0 -5 Q 28 -5 28 60 Z" fill="#1E3A5F"/>
                <path d="M -34 5 Q -34 -8 -20 -8 L 20 -8 Q 34 -8 34 5 L 34 28 L -34 28 Z" fill="#E07A37"/>
              </g>
            
              <g transform="translate(80,0)">
                <circle cx="0" cy="-30" r="18" fill="#1E3A5F"/>
                <path d="M -28 60 Q -28 -5 0 -5 Q 28 -5 28 60 Z" fill="#1E3A5F"/>
                <path d="M -34 5 Q -34 -8 -20 -8 L 20 -8 Q 34 -8 34 5 L 34 28 L -34 28 Z" fill="#E07A37"/>
              </g>
            
              <g transform="translate(160,0)">
                <circle cx="0" cy="-30" r="18" fill="#1E3A5F"/>
                <path d="M -28 60 Q -28 -5 0 -5 Q 28 -5 28 60 Z" fill="#1E3A5F"/>
                <path d="M -34 5 Q -34 -8 -20 -8 L 20 -8 Q 34 -8 34 5 L 34 28 L -34 28 Z" fill="#E07A37"/>
              </g>
            </g>

  <!-- headline -->
  <text x="60" y="730" font-family="Georgia,serif" font-weight="700" font-size="58" fill="#2C2C2C">
    <tspan x="60" dy="0">£10 keeps five people warm</tspan><tspan x="60" dy="70">this winter.</tspan>
  </text>

  <!-- sub headline -->
  <text x="60" y="900" font-family="Georgia,serif" font-style="italic" font-size="30" fill="#1E3A5F">
    <tspan x="60" dy="0">Coats. Socks. Base layers. For five people. Every</tspan><tspan x="60" dy="38">month.</tspan>
  </text>

  <!-- body copy -->
  <text x="60" y="1010" font-family="Helvetica,Arial,sans-serif" font-size="22" fill="#2C2C2C">
    <tspan x="60" dy="0">A monthly gift of £10 funds winter clothing for five people sleeping</tspan><tspan x="60" dy="32">rough in London — coats, thermal base layers and dry socks delivered</tspan><tspan x="60" dy="32">to them through our outreach teams, month after month.</tspan>
  </text>

  <!-- icon label band -->
  <rect x="60" y="1240" width="1080" height="70" rx="8" fill="#FFFFFF" stroke="#E8DDCB" stroke-width="2"/>
  <text x="600.0" y="1283" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-weight="600" font-size="22" fill="#1E3A5F">♦  ♦  ♦  ♦  ♦   =   5 people kept warm</text>

  <!-- CTA button -->
  <rect x="60" y="1360" width="360" height="80" rx="6" fill="#E07A37"/>
  <text x="240" y="1411" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-weight="700" font-size="26" fill="#FFFFFF" letter-spacing="1">DONATE TODAY</text>

  <!-- footer note -->
  <text x="1140" y="1405" text-anchor="end" font-family="Helvetica,Arial,sans-serif" font-size="16" fill="#5C6B7A">Reg. charity · stmungos.org/donate</text>

  <!-- bottom border -->
  <rect x="0" y="1488" width="1200" height="12" fill="#1E3A5F"/>
</svg>